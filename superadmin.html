<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClubPass · Administración</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0B0E;--surface:#15151A;--surface2:#1D1D24;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --text:#EDEAE0;--muted:#8A8794;--faint:#55525E;
  --accent:#6C8CFF;--accent-soft:rgba(108,140,255,.12);--accent-line:rgba(108,140,255,.35);
  --gold:#C9A227;--ok:#3DA35D;--ok-soft:rgba(61,163,93,.12);--err:#D64545;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Archivo',sans-serif;font-size:14px;min-height:100vh}
.disp{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.ic{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.ic-sm{width:16px;height:16px}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,rgba(108,140,255,.07),transparent 60%)}
.login-box{width:360px;max-width:100%;background:var(--surface);border:1px solid var(--line);padding:40px 32px;text-align:center}
.login-mark{width:40px;height:40px;border:1.5px solid var(--accent);position:relative;margin:0 auto 20px;transform:rotate(45deg)}
.login-mark::after{content:'';position:absolute;inset:5px;border:1.5px solid var(--line2)}
.login-name{font-size:28px;letter-spacing:5px;font-weight:600}
.login-name b{color:var(--accent);font-weight:600}
.login-sub{font-size:10.5px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin:4px 0 28px}
.fld{margin-bottom:13px;text-align:left}
.fld label{display:block;font-size:10.5px;letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:6px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:12px 13px;font-family:'Archivo',sans-serif;font-size:15px;outline:none}
.inp:focus{border-color:var(--accent)}
.btn{border:none;background:var(--accent);color:#0B0B0E;font-family:'Archivo',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:12px 18px;font-size:13px}
.btn:active{opacity:.85}
.btn-block{width:100%;padding:14px;margin-top:6px}
.btn-ghost{background:none;border:1px solid var(--line2);color:var(--text)}
.btn-sm{padding:8px 14px;font-size:11.5px}
.msg-err{color:var(--err);font-size:13px;margin-top:12px;display:none}
#app{display:none}
.top{position:sticky;top:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;height:58px}
.top .brand{font-size:20px;letter-spacing:4px;font-weight:600}
.top .brand b{color:var(--accent);font-weight:600}
.top .role{margin-left:12px;padding-left:12px;border-left:1px solid var(--line2);font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.top .sp{flex:1}
.wrap{max-width:1080px;margin:0 auto;padding:26px 22px 60px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--line);border-top:2px solid var(--accent);padding:18px}
.stat .n{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:600;color:var(--accent);line-height:1}
.stat .l{font-size:10.5px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:6px}
.sec{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}
.sec .t{font-size:14px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.venue{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--vc,#C9A227);padding:18px}
.venue-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.venue-nm{font-family:'Barlow Condensed',sans-serif;font-size:22px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.venue-slug{font-size:12px;color:var(--faint);margin-top:1px}
.toggle{position:relative;width:44px;height:24px;background:var(--surface2);border:1px solid var(--line2);cursor:pointer;flex-shrink:0}
.toggle.on{background:var(--ok-soft);border-color:var(--ok)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:var(--faint);transition:all .2s}
.toggle.on::after{left:22px;background:var(--ok)}
.venue-meta{display:flex;gap:18px;font-size:12.5px;color:var(--muted)}
.venue-meta b{color:var(--text);font-weight:600}
.tag{display:inline-flex;padding:3px 9px;font-size:11px;font-weight:600;border:1px solid var(--line2)}
.tag-ok{background:var(--ok-soft);color:var(--ok);border-color:rgba(61,163,93,.3)}
.tag-off{background:var(--surface2);color:var(--faint)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--line2);width:440px;max-width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:24px;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:18px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--accent);color:var(--accent);padding:13px 20px;font-size:13.5px;font-weight:600;z-index:200;display:none}
.empty{text-align:center;padding:40px;color:var(--faint)}
</style>
</head>
<body>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
<symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
<symbol id="i-out" viewBox="0 0 24 24"><path d="M14 4h6v16h-6M10 8l-4 4 4 4M6 12h11"/></symbol>
</svg>

<div id="login">
  <div class="login-box">
    <div class="login-mark"></div>
    <div class="login-name disp">CLUB<b>PASS</b></div>
    <div class="login-sub">Administración general</div>
    <div class="fld"><label>Contraseña maestra</label><input class="inp" type="password" id="lg-pass" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn btn-block" onclick="login()">Ingresar</button>
    <div class="msg-err" id="lg-err">Contraseña incorrecta</div>
  </div>
</div>

<div id="app">
  <div class="top">
    <span class="brand disp">CLUB<b>PASS</b></span>
    <span class="role">Administración</span>
    <span class="sp"></span>
    <button class="btn btn-ghost btn-sm" onclick="logout()"><svg class="ic ic-sm"><use href="#i-out"/></svg></button>
  </div>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="sec">
      <span class="t">Boliches</span>
      <button class="btn btn-sm" onclick="openModal()"><svg class="ic ic-sm" style="display:inline;vertical-align:-3px"><use href="#i-plus"/></svg> Nuevo boliche</button>
    </div>
    <div class="grid" id="venues"></div>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Nuevo boliche</h3>
    <div class="fld"><label>Nombre</label><input class="inp" id="m-nombre" placeholder="Club Jagger"></div>
    <div class="fld"><label>Slug (URL interna, sin espacios)</label><input class="inp" id="m-slug" placeholder="club-jagger" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')"></div>
    <div class="row2">
      <div class="fld"><label>Color primario</label><input class="inp" type="color" id="m-color" value="#C9A227" style="height:46px;padding:4px"></div>
      <div class="fld"><label>Plan</label><input class="inp" id="m-plan" value="mensual"></div>
    </div>
    <div class="fld"><label>Descripción</label><input class="inp" id="m-desc" placeholder="Breve frase"></div>
    <div style="height:1px;background:var(--line);margin:18px 0"></div>
    <div style="font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-bottom:12px">Cuenta del dueño</div>
    <div class="fld"><label>Email del owner</label><input class="inp" type="email" id="m-email" placeholder="dueño@boliche.com"></div>
    <div class="fld"><label>Contraseña inicial</label><input class="inp" id="m-pass" placeholder="la cambia después"></div>
    <button class="btn btn-block" onclick="crearBoliche()">Crear boliche</button>
    <div class="msg-err" id="m-err"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let BOLICHES=[];
function toast(m,ok=true){const t=document.getElementById('toast');t.textContent=m;t.style.borderColor=ok?'var(--accent)':'var(--err)';t.style.color=ok?'var(--accent)':'var(--err)';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2600)}
async function api(u,m='GET',b=null){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(u,o);return r.json()}

async function login(){
  const pass=document.getElementById('lg-pass').value;
  const d=await api('/api/superadmin/login','POST',{password:pass});
  if(d.ok){startApp()}else document.getElementById('lg-err').style.display='block';
}
async function logout(){await api('/api/superadmin/logout','POST');location.reload()}
function startApp(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';load()}

async function load(){
  BOLICHES=await api('/api/superadmin/boliches');
  if(BOLICHES.ok===false){return}
  const activos=BOLICHES.filter(b=>b.activo).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${BOLICHES.length}</div><div class="l">Boliches totales</div></div>
    <div class="stat"><div class="n">${activos}</div><div class="l">Activos</div></div>
    <div class="stat"><div class="n">${BOLICHES.length-activos}</div><div class="l">Suspendidos</div></div>`;
  document.getElementById('venues').innerHTML=BOLICHES.map(b=>`
    <div class="venue" style="--vc:${b.color_primario||'#C9A227'}">
      <div class="venue-h">
        <div><div class="venue-nm">${b.nombre}</div><div class="venue-slug">/${b.slug}</div></div>
        <div class="toggle ${b.activo?'on':''}" onclick="toggle('${b.id}')"></div>
      </div>
      <div class="venue-meta">
        <span>Estado <b>${b.activo?'<span class=\"tag tag-ok\">Activo</span>':'<span class=\"tag tag-off\">Suspendido</span>'}</b></span>
        <span>Plan <b>${b.plan||'—'}</b></span>
      </div>
    </div>`).join('')||'<div class="empty">Todavía no hay boliches. Creá el primero.</div>';
}
async function toggle(id){const d=await api('/api/superadmin/boliches/'+id+'/toggle','POST');if(d.ok){toast(d.activo?'Boliche activado':'Boliche suspendido');load()}else toast('Error',false)}

function openModal(){document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
async function crearBoliche(){
  const b={nombre:document.getElementById('m-nombre').value.trim(),slug:document.getElementById('m-slug').value.trim(),color_primario:document.getElementById('m-color').value,plan:document.getElementById('m-plan').value.trim(),descripcion:document.getElementById('m-desc').value.trim(),admin_email:document.getElementById('m-email').value.trim(),admin_password:document.getElementById('m-pass').value};
  const err=document.getElementById('m-err');err.style.display='none';
  if(!b.nombre||!b.slug){err.textContent='Nombre y slug son obligatorios';err.style.display='block';return}
  const d=await api('/api/superadmin/boliches','POST',b);
  if(d.ok){toast('Boliche creado');closeModal();load();['m-nombre','m-slug','m-desc','m-email','m-pass'].forEach(i=>document.getElementById(i).value='')}
  else{err.textContent=d.error||'Error';err.style.display='block'}
}

(async()=>{const d=await api('/api/superadmin/boliches');if(d.ok!==false&&Array.isArray(d))startApp()})();
</script>
</body>
</html>
