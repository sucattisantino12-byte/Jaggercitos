<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  button,input{font-family:inherit;}
  ::-webkit-scrollbar{width:0;height:0;}
  html,body{height:100%;background:#0a0908;}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;color:#f4f1ea;overflow:hidden;overscroll-behavior:none;}
  .sg{font-family:'Space Grotesk',sans-serif;}
  :root{
    --bg:#0a0908;--surface:#141210;--surface2:#1b1815;--surface3:#1f1b16;
    --line:rgba(245,241,234,0.08);--line2:rgba(245,241,234,0.12);
    --text:#f4f1ea;--muted:#9a948a;--faint:#6b665e;--faint2:#5c574f;
    --accent:#d4a829;--accent-soft:rgba(212,168,41,0.12);--accent-line:rgba(212,168,41,0.3);
    --ok:#3da35d;--err:#c0564a;
    --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  }
  @keyframes cp-sheet{from{transform:translateY(100%);}to{transform:translateY(0);}}
  @keyframes cp-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes cp-scr{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}
  @keyframes cp-toast{0%{opacity:0;transform:translate(-50%,-10px);}100%{opacity:1;transform:translate(-50%,0);}}
  @keyframes cp-pop{0%{transform:scale(.85);opacity:0;}100%{transform:scale(1);opacity:1;}}
  @keyframes cp-rise{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(calc(-100vh - 60px)) translateX(var(--dx)) rotate(var(--rt));opacity:0;}}
  .app{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);overflow:hidden;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;animation:cp-scr .3s ease;}
  .hide{display:none!important;}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .ic{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block;}
  .toast{position:fixed;top:calc(var(--st) + 16px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent-line);color:var(--accent);padding:11px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:200;display:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:cp-toast .3s ease;}
  .empty{text-align:center;padding:46px 20px;color:var(--faint);font-size:14px;}
  input::placeholder{color:var(--faint2);}
</style>
</head>

// Devuelve el inner SVG de un ícono por su id "seccion::nombre"
function getIconSvg(id){
  if(!id) return null;
  const [sec,nom] = id.split('::');
  const grupo = ICON_CATALOG[sec]; if(!grupo) return null;
  const item = grupo.find(x=>x.nombre===nom); return item?item.svg:null;
}
function iconHtml(id, size=22){
  const inner = getIconSvg(id);
  if(!inner) return '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
}

const NIVELES=[{n:'Básico',min:0,c:'#9a948a'},{n:'Plata',min:300,c:'#c8cdd6'},{n:'Oro',min:1000,c:'#d4a829'},{n:'VIP',min:3000,c:'#9b7bd4'}];
function nivelInfo(pts){
  let idx=0; for(let i=0;i<NIVELES.length;i++){if(pts>=NIVELES[i].min)idx=i;}
  const cur=NIVELES[idx], next=NIVELES[idx+1];
  const pct=next?Math.min(100,Math.round((pts-cur.min)/(next.min-cur.min)*100)):100;
  return {nivel:idx+1, nombre:cur.n, color:cur.c, pct, next, falta:next?next.min-pts:0};
}

const A=document.getElementById('app');
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return (n||0).toLocaleString('es-AR');}
function ptsName(){return B&&B.slug==='club-jagger'?'jaggercitos':'puntos';}
function accent(){return (B&&B.color_primario)||'#d4a829';}

function toast(m,ok=true){
  const t=document.getElementById('toast');
  t.textContent=m;t.style.borderColor=ok?'var(--accent-line)':'rgba(192,86,74,.4)';t.style.color=ok?'var(--accent)':'var(--err)';
  t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2600);
}
async function api(u,m='GET',b=null){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(b)o.body=JSON.stringify(b);
  try{const r=await fetch(u,o);return await r.json();}catch(e){return{ok:false,error:'Sin conexión'};}
}

/* ════════ ROUTER ════════ */
let VIEW='splash', BTAB='premios';
function render(){
  if(VIEW==='splash'){A.innerHTML=splashHTML();return;}
  if(VIEW==='auth'){A.innerHTML=authHTML();return;}
  let html='';
  if(VIEW==='home')html=homeHTML();
  else if(VIEW==='boliche')html=bolicheHTML();
  else if(VIEW==='perfil')html=perfilHTML();
  A.innerHTML=html+navHTML();
}
function go(v){VIEW=v;render();
  if(v==='home')loadHome();
  if(v==='perfil')loadPerfil();
}

/* ════════ AUTH LÓGICA ════════ */
async function doLogin(){
  const user=document.getElementById('l-user').value.trim(), pass=document.getElementById('l-pass').value;
  if(!user||!pass)return;
  const d=await api('/api/auth/login','POST',{usuario:user,password:pass});
  if(d.ok){U=d.usuario;localStorage.setItem('cp_u',JSON.stringify(U));go('home');}
  else{const e=document.getElementById('auth-err');e.textContent=d.error||'Datos incorrectos';e.style.display='block';}
}
async function doRegistro(){
  const usuario=document.getElementById('r-user').value.trim();
  const nombre=document.getElementById('r-nombre').value.trim();
  const dni=document.getElementById('r-dni').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value, pass2=document.getElementById('r-pass2').value;
  const err=document.getElementById('auth-err');err.style.display='none';
  if(!usuario||!nombre||!dni||!email||!pass){err.textContent='Completá todos los campos';err.style.display='block';return;}
  if(pass.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';err.style.display='block';return;}
  if(pass!==pass2){err.textContent='Las contraseñas no coinciden';err.style.display='block';return;}
  const d=await api('/api/auth/registro','POST',{usuario,nombre,genero:GEN,dni,email,password:pass});
  if(d.ok){document.getElementById('auth-ok').style.display='block';setTimeout(()=>{AUTHTAB='login';render();},1300);}
  else{err.textContent=d.error||'Error al registrarse';err.style.display='block';}
}
function logout(){U=null;localStorage.removeItem('cp_u');go('auth');}

async function refreshMe(){
  if(!U)return;
  const d=await api('/api/auth/me?usuario='+encodeURIComponent(U.usuario));
  if(d.ok){U={...U,...d.usuario,boliches:d.boliches};localStorage.setItem('cp_u',JSON.stringify(U));}
}

function renderPremios(q=''){
  const cont=document.getElementById('prem-list');if(!cont)return;
  const tint=accent();
  const pts=MYBU.jaggercitos||0;
  let lista=CAT==='__todos'?PREMIOS:PREMIOS.filter(p=>(p.categoria||'')===CAT);
  if(q)lista=lista.filter(p=>p.nombre.toLowerCase().includes(q.toLowerCase()));
  if(!lista.length){cont.innerHTML='<div class="empty">No hay premios para mostrar</div>';return;}
  // agrupar por categoría con título
  const cats=CAT==='__todos'?[...new Set(lista.map(p=>p.categoria||'Otros'))]:[CAT];
  const ordenCat=c=>{const i=CATS.findIndex(x=>x.nombre===c);return i<0?999:i;};
  cats.sort((a,b)=>ordenCat(a)-ordenCat(b));
  cont.innerHTML=cats.map(cat=>{
    const items=lista.filter(p=>(p.categoria||'Otros')===cat).sort((a,b)=>a.pts_necesarios-b.pts_necesarios);
    if(!items.length)return '';
    return `<div style="margin-bottom:8px;">

        ${items.map(p=>premioCard(p,pts,tint)).join('')}

  }).join('');
}

    ?`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${iconInner}</svg>`
    :(p.icono&&p.icono.length<=4?`<span style="font-size:25px;line-height:1;">${p.icono}</span>`:`<svg class="ic" width="22" height="22" viewBox="0 0 24 24" stroke-width="1.7">${UI.gift}</svg>`);

    </div>
    <div style="margin-top:12px;height:5px;border-radius:999px;background:rgba(245,241,234,.08);overflow:hidden;"><div style="height:100%;width:${pct}%;background:${full?'var(--ok)':tint};border-radius:999px;transition:width .4s;"></div></div>

      <span style="font-size:12px;color:${full?'var(--ok)':'var(--muted)'};">${full?'Disponible':`Faltan ${fmt(need-pts)} ${ptsName()}`}</span>

        <div style="position:relative;flex:none;">
          <div class="sg" style="width:60px;height:60px;border-radius:18px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:var(--accent);overflow:hidden;">${U.avatar?`<img src="${U.avatar}" style="width:100%;height:100%;object-fit:cover;">`:ini}</div>
          <button onclick="pickAvatar()" style="position:absolute;bottom:-4px;right:-4px;width:24px;height:24px;border-radius:8px;background:var(--accent);border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;color:#0a0908;cursor:pointer;"><svg class="ic" width="12" height="12" viewBox="0 0 24 24" stroke-width="2.4">${UI.cam}</svg></button>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:18px;font-weight:600;">${esc(U.nombre||U.usuario)}</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;">@${esc(U.usuario)} · DNI ${esc(U.dni||'—')}</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--faint);margin:24px 2px 10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;">Configuración de la cuenta</div>
      <div style="background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;">
        ${cfgRow('cam','Cambiar foto','','pickAvatar()')}
        ${cfgRow('lock','Cambiar contraseña','','openPassSheet()')}
        ${cfgRow('mail','Cambiar email',U.email||'','openEmailSheet()')}
      </div>
      <button onclick="logout()" style="margin-top:12px;width:100%;background:transparent;color:var(--err);border:1px solid rgba(192,86,74,.35);border-radius:15px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;">Cerrar sesión</button>
    </div>
  </div>${navHTML()}`;
}
function cfgRow(icon,label,value,action){
  return `<button onclick="${action}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:15px 16px;cursor:pointer;color:inherit;">
    <div style="flex:none;width:34px;height:34px;border-radius:10px;background:var(--surface3);display:flex;align-items:center;justify-content:center;color:var(--muted);"><svg class="ic" width="18" height="18" viewBox="0 0 24 24" stroke-width="1.8">${UI[icon]}</svg></div>
    <div style="flex:1;min-width:0;"><div style="font-size:14.5px;font-weight:500;">${label}</div>${value?`<div style="font-size:12.5px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(value)}</div>`:''}</div>
    <svg class="ic" width="18" height="18" viewBox="0 0 24 24" stroke="var(--faint2)">${UI.chev}</svg>
  </button>`;
}
async function loadPerfil(){await refreshMe();render();}

/* ════════ HISTORIAL ════════ */
async function loadHist(){
  if(!B||!U)return;
  const hist=await api('/api/usuario/historial?usuario='+encodeURIComponent(U.usuario)+'&boliche='+B.slug);
  const cont=document.getElementById('hist-list');if(!cont)return;
  const tint=accent();
  if(!hist||!hist.length){cont.innerHTML='<div class="empty">Sin asistencias registradas</div>';return;}
  cont.innerHTML=hist.map(h=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 2px;border-bottom:1px solid var(--line);">
      <div><div style="font-size:14px;font-weight:500;">${esc(h.evento_nombre||'Noche')}</div><div style="font-size:12px;color:var(--faint);margin-top:2px;">${esc(h.fecha||'')}</div></div>
      <div class="sg" style="font-weight:600;font-size:14px;color:${tint};">+${fmt(h.total_pts||0)}</div>
    </div>`).join('');
}

/* ════════ CANJE ════════ */
function pedirCanje(id,nombre,pts){
  canjeNuevo={id,nombre,pts};
  const tint=accent();
  showSheet(`
    <div style="width:38px;height:4px;border-radius:999px;background:rgba(245,241,234,.18);margin:0 auto 18px;"></div>
    <div class="sg" style="font-weight:700;font-size:20px;">¿Confirmás el canje?</div>
    <div style="font-size:14px;color:var(--muted);margin-top:4px;">Vas a usar tus ${ptsName()} por este premio.</div>
    <div style="margin-top:18px;background:#0f0d0a;border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:15px;font-weight:600;">${esc(nombre)}</span>
      <span class="sg" style="font-weight:700;font-size:18px;color:${tint};">${fmt(pts)} pts</span>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px;">
      <button onclick="closeSheet()" style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--line2);border-radius:13px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;">Cancelar</button>
      <button onclick="confirmarCanje()" style="flex:1.4;background:${tint};color:#0a0908;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">Confirmar</button>
    </div>`);
}
async function confirmarCanje(){
  closeSheet();
  if(!canjeNuevo)return;
  const d=await api('/api/canjes','POST',{usuario:U.usuario,boliche:B.slug,premio_id:canjeNuevo.id});
  if(d.ok){
    confeti();
    canjeNuevo.codigo=d.codigo;canjeNuevo.boliche=B.nombre;
    await refreshMe();
    MYBU=(U.boliches||[]).find(x=>x.slug===B.slug)||MYBU;
    showCanjeExito(canjeNuevo);
  }else toast(d.error||'No se pudo canjear',false);
}
function showCanjeExito(c){
  const tint=accent();
  showSheet(`
    <div style="width:38px;height:4px;border-radius:999px;background:rgba(245,241,234,.18);margin:0 auto 18px;"></div>
    <div style="text-align:center;">
      <div style="width:56px;height:56px;border-radius:50%;background:${tint}1f;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:${tint};"><svg class="ic" width="30" height="30" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
      <div class="sg" style="font-weight:700;font-size:22px;">¡Canje exitoso!</div>
      <div style="font-size:15px;color:var(--muted);margin-top:4px;">Canjeaste <b style="color:var(--text);">${esc(c.nombre)}</b></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:22px;">
      <button onclick="usarAhora()" style="width:100%;background:${tint};color:#0a0908;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;">Usar ahora</button>
      <button onclick="usarDespues()" style="width:100%;background:transparent;color:var(--ok);border:1px solid rgba(61,163,93,.4);border-radius:14px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;">Usar después</button>
    </div>`);
}
function usarAhora(){closeSheet();const c=canjeNuevo;canjeNuevo=null;openCaja(c);}
function usarDespues(){
  closeSheet();
  if(canjeNuevo){const p=getPend();p.push(canjeNuevo);localStorage.setItem('cp_pend',JSON.stringify(p));canjeNuevo=null;toast('Guardado en tu perfil');render();}
}
function getPend(){try{return JSON.parse(localStorage.getItem('cp_pend')||'[]').filter(c=>!B||c.boliche===B.nombre||true)}catch(e){return[]}}
function getPendAll(){try{return JSON.parse(localStorage.getItem('cp_pend')||'[]')}catch(e){return[]}}

/* ════════ CAJA (pantalla crema) ════════ */
function openCaja(canje=null){
  if(!canje){const p=getPendAll().filter(c=>c.boliche===(B&&B.nombre));if(p.length)canje=p[0];}
  const tint=accent();
  const mono=(B&&B.nombre?B.nombre:'C')[0].toUpperCase();
  const pts=MYBU?MYBU.jaggercitos:0, ni=nivelInfo(pts);
  let overlay=document.getElementById('caja-ov');
  if(!overlay){overlay=document.createElement('div');overlay.id='caja-ov';document.body.appendChild(overlay);}
  overlay.style.cssText='position:fixed;inset:0;z-index:60;max-width:480px;margin:0 auto;';
  overlay.innerHTML=`<div style="position:absolute;inset:0;background:linear-gradient(165deg,#f6f1e4 0%,#efe6cf 100%);display:flex;flex-direction:column;animation:cp-fade .25s ease;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:calc(var(--st) + 20px) 22px 0;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="sg" style="width:26px;height:26px;border-radius:8px;background:${tint};display:flex;align-items:center;justify-content:center;color:#0a0908;font-weight:700;font-size:12px;">${mono}</div>
        <span class="sg" style="font-size:13px;font-weight:700;color:#1c1813;letter-spacing:.04em;">${esc(B&&B.nombre||'ClubPass')}</span>
      </div>
      <button onclick="closeCaja()" style="width:34px;height:34px;border-radius:11px;border:1px solid rgba(28,24,19,.18);background:transparent;color:#1c1813;display:flex;align-items:center;justify-content:center;cursor:pointer;"><svg class="ic" width="18" height="18" viewBox="0 0 24 24" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;">
      <div style="font-size:11px;letter-spacing:.22em;color:#8a7c55;text-transform:uppercase;font-weight:600;">Mostrá esto en la caja</div>
      <div class="sg" style="font-weight:700;font-size:clamp(40px,15vw,64px);color:#15110a;letter-spacing:-.01em;text-align:center;word-break:break-word;line-height:1;margin-top:14px;">${esc((U.usuario||'').toUpperCase())}</div>
      ${U.nombre_pantalla&&U.nombre_pantalla!==U.usuario?`<div class="sg" style="font-weight:600;font-size:clamp(24px,8vw,38px);color:#7a6e4d;margin-top:10px;text-align:center;">${esc(U.nombre_pantalla)}</div>`:''}
      <div style="font-size:15px;color:#5a513a;margin-top:14px;">${esc(U.nombre||'')}</div>
      <div style="display:flex;gap:10px;margin-top:18px;">
        <span style="font-size:12px;font-weight:700;color:#1c1813;background:rgba(28,24,19,.07);border:1px solid rgba(28,24,19,.14);padding:5px 13px;border-radius:999px;">DNI ${esc(U.dni||'—')}</span>
        <span style="font-size:12px;font-weight:700;color:#1c1813;background:rgba(28,24,19,.07);border:1px solid rgba(28,24,19,.14);padding:5px 13px;border-radius:999px;">Nv ${ni.nivel} · ${ni.nombre}</span>
      </div>
    </div>
    <div style="padding:0 22px calc(46px + var(--sb));">
      ${canje?`<div style="background:#15110a;border-radius:18px;padding:18px;display:flex;align-items:center;gap:14px;">
        <div style="flex:none;width:44px;height:44px;border-radius:13px;background:${tint}29;display:flex;align-items:center;justify-content:center;color:${tint};"><svg class="ic" width="22" height="22" viewBox="0 0 24 24">${UI.ticket}</svg></div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#9a8c64;font-weight:600;">Canje pendiente</div>
          <div style="font-size:15px;font-weight:600;color:#f4f1ea;margin-top:2px;">${esc(canje.nombre)}</div>
          <div class="sg" style="font-size:11.5px;color:#6b6149;margin-top:1px;">Código ${esc(canje.codigo||'—')}</div>
        </div>
      </div>`:`<div style="text-align:center;font-size:12.5px;color:#8a7c55;">El cajero suma tu consumo a este usuario</div>`}
    </div>
  </div>`;
  overlay.style.display='block';
  if('wakeLock' in navigator)navigator.wakeLock.request('screen').catch(()=>{});
  // Monitorear entrega del canje para autocerrar
  if(cajaMonitor){clearInterval(cajaMonitor);cajaMonitor=null;}
  if(canje&&canje.codigo){
    cajaMonitor=setInterval(async()=>{
      try{const r=await fetch('/api/canjes/estado?codigo='+encodeURIComponent(canje.codigo));const d=await r.json();
        if(d.ok&&d.usado){clearInterval(cajaMonitor);cajaMonitor=null;
          // quitar de pendientes
          const p=getPendAll().filter(c=>c.codigo!==canje.codigo);localStorage.setItem('cp_pend',JSON.stringify(p));
          closeCaja();toast('Premio entregado ✓');render();
        }}catch(e){}
    },5000);
  }
}
function closeCaja(){if(cajaMonitor){clearInterval(cajaMonitor);cajaMonitor=null;}const o=document.getElementById('caja-ov');if(o)o.style.display='none';}

/* ════════ SHEETS ════════ */
function showSheet(inner){
  let s=document.getElementById('sheet-ov');
  if(!s){s=document.createElement('div');s.id='sheet-ov';document.body.appendChild(s);}
  s.style.cssText='position:fixed;inset:0;z-index:70;max-width:480px;margin:0 auto;';
  s.innerHTML=`<div onclick="if(event.target===this)closeSheet()" style="position:absolute;inset:0;background:rgba(5,4,3,.72);animation:cp-fade .2s ease;"></div>
    <div style="position:absolute;left:0;right:0;bottom:0;background:#16130f;border-top:1px solid var(--line2);border-radius:24px 24px 0 0;padding:24px 24px calc(28px + var(--sb));animation:cp-sheet .3s cubic-bezier(.32,.72,0,1);">${inner}</div>`;
  s.style.display='block';
}
function closeSheet(){const s=document.getElementById('sheet-ov');if(s)s.style.display='none';}

function openDisplaySheet(){
  showSheet(`
    <div style="width:38px;height:4px;border-radius:999px;background:rgba(245,241,234,.18);margin:0 auto 18px;"></div>
    <div class="sg" style="font-weight:700;font-size:20px;">Nombre para mostrar</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;">Así te ven en el ranking del boliche. Decílo en recepción o caja.</div>
    <input id="disp-input" value="${esc(U.nombre_pantalla||'')}" placeholder="ej: FLORENCIA" oninput="this.value=this.value.toUpperCase()" style="width:100%;margin-top:16px;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--text);padding:14px 16px;font-size:16px;outline:none;" />
    <button onclick="saveDisplay()" style="width:100%;margin-top:14px;background:var(--accent);color:#0a0908;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;">Guardar</button>`);
}
async function saveDisplay(){
  const v=document.getElementById('disp-input').value.trim();
  const d=await api('/api/usuario/nombre-pantalla','POST',{usuario:U.usuario,nombre_pantalla:v});
  if(d.ok){U.nombre_pantalla=v;localStorage.setItem('cp_u',JSON.stringify(U));closeSheet();toast('Nombre guardado');render();}
  else toast(d.error||'Error',false);
}
function openPassSheet(){
  showSheet(`
    <div style="width:38px;height:4px;border-radius:999px;background:rgba(245,241,234,.18);margin:0 auto 18px;"></div>
    <div class="sg" style="font-weight:700;font-size:20px;">Cambiar contraseña</div>
    <div style="display:flex;flex-direction:column;gap:11px;margin-top:16px;">
      <input id="cp-old" type="password" placeholder="Contraseña actual" style="width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--text);padding:14px 16px;font-size:15px;outline:none;" />
      <input id="cp-new" type="password" placeholder="Nueva (mín. 6)" style="width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--text);padding:14px 16px;font-size:15px;outline:none;" />
      <input id="cp-new2" type="password" placeholder="Repetir nueva" style="width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--text);padding:14px 16px;font-size:15px;outline:none;" />
      <button onclick="savePass()" style="width:100%;background:var(--accent);color:#0a0908;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;">Guardar</button>
      <div id="cp-err" style="color:var(--err);font-size:13px;text-align:center;display:none;"></div>
    </div>`);
}
async function savePass(){
  const old=document.getElementById('cp-old').value,nu=document.getElementById('cp-new').value,nu2=document.getElementById('cp-new2').value;
  const err=document.getElementById('cp-err');err.style.display='none';
  if(nu.length<6){err.textContent='Mínimo 6 caracteres';err.style.display='block';return;}
  if(nu!==nu2){err.textContent='No coinciden';err.style.display='block';return;}
  const d=await api('/api/usuario/password','POST',{usuario:U.usuario,actual:old,nueva:nu});
  if(d.ok){closeSheet();toast('Contraseña actualizada');}else{err.textContent=d.error||'Error';err.style.display='block';}
}
function openEmailSheet(){
  showSheet(`
    <div style="width:38px;height:4px;border-radius:999px;background:rgba(245,241,234,.18);margin:0 auto 18px;"></div>
    <div class="sg" style="font-weight:700;font-size:20px;">Cambiar email</div>
    <div style="display:flex;flex-direction:column;gap:11px;margin-top:16px;">
      <input id="ce-new" type="email" placeholder="Nuevo email" value="${esc(U.email||'')}" style="width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--text);padding:14px 16px;font-size:15px;outline:none;" />
      <input id="ce-pass" type="password" placeholder="Tu contraseña" style="width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:13px;color:var(--text);padding:14px 16px;font-size:15px;outline:none;" />
      <button onclick="saveEmail()" style="width:100%;background:var(--accent);color:#0a0908;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;">Guardar</button>
      <div id="ce-err" style="color:var(--err);font-size:13px;text-align:center;display:none;"></div>
    </div>`);
}
async function saveEmail(){
  const nu=document.getElementById('ce-new').value.trim(),pass=document.getElementById('ce-pass').value;
  const err=document.getElementById('ce-err');err.style.display='none';
  if(!nu){err.textContent='Ingresá el email';err.style.display='block';return;}
  const d=await api('/api/usuario/email','POST',{usuario:U.usuario,password:pass,email:nu});
  if(d.ok){U.email=nu;localStorage.setItem('cp_u',JSON.stringify(U));closeSheet();toast('Email actualizado');render();}
  else{err.textContent=d.error||'Error';err.style.display='block';}
}

/* ════════ AVATAR ════════ */
function pickAvatar(){document.getElementById('f-avatar').click();}
document.getElementById('f-avatar').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{const img=new Image();img.onload=async()=>{
    const c=document.createElement('canvas');c.width=280;c.height=280;const x=c.getContext('2d');
    const r=Math.max(280/img.width,280/img.height);
    x.drawImage(img,(280-img.width*r)/2,(280-img.height*r)/2,img.width*r,img.height*r);
    const b64=c.toDataURL('image/jpeg',.75);
    const d=await api('/api/usuario/avatar','POST',{usuario:U.usuario,avatar:b64});
    if(d.ok){U.avatar=b64;localStorage.setItem('cp_u',JSON.stringify(U));toast('Foto actualizada');render();}else toast('Error al subir',false);
  };img.src=e.target.result;};
  rd.readAsDataURL(f);this.value='';
});

/* ════════ CONFETI ════════ */
function confeti(){
  const cols=[accent(),'#EFE6C2','#fff','#8B6914'];
  for(let i=0;i<70;i++){const e=document.createElement('div');
    const s=5+Math.random()*8;
    e.style.cssText=`position:fixed;bottom:0;left:${Math.random()*100}%;width:${s}px;height:${s}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none;z-index:300;--dx:${(Math.random()-.5)*280}px;--rt:${(Math.random()-.5)*900}deg;animation:cp-rise ${1.4+Math.random()*1.4}s ${Math.random()*.4}s cubic-bezier(.2,.8,.4,1) forwards;`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),3200);}
}

/* ════════ AUTO-REFRESH ════════ */
setInterval(async()=>{
  if(!U||VIEW==='splash'||VIEW==='auth')return;
  const prev=MYBU?MYBU.jaggercitos:0;
  await refreshMe();
  if(VIEW==='boliche'&&B){
    const nb=(U.boliches||[]).find(x=>x.slug===B.slug);
    if(nb){const subió=nb.jaggercitos>(MYBU?MYBU.jaggercitos:0);MYBU=nb;
      if(subió){toast('+'+fmt(nb.jaggercitos-prev)+' '+ptsName());render();}
    }
  }
},5000);

/* ════════ INIT ════════ */
function afterRender(){
  if(VIEW==='boliche'&&BTAB==='premios')renderPremios(document.getElementById('prem-search')?.value||'');
  if(VIEW==='boliche'&&BTAB==='perfil')loadHist();
}
const _render=render;
render=function(){_render();afterRender();};

window.addEventListener('load',()=>{
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
  setTimeout(()=>{if(U){go('home');}else{VIEW='auth';render();}},1600);
});
render();
</script>
</body>
</html>
